<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXIT-Prototyp · Level-Engine</title>
<style>
  :root{
    --ink:#e8dcc8; --gold:#c9a24b; --gold-dim:#8a6f33; --line:#3a2c1f;
    --bad:#b4533a; --good:#6f9b54; --panel:#241b14;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:#0c0805;color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;
    display:flex;flex-direction:column;min-height:100%}
  header{display:flex;align-items:center;justify-content:space-between;gap:1rem;
    padding:.7rem 1.1rem;border-bottom:1px solid var(--line);background:linear-gradient(#241b14,#1a130d)}
  header h1{font-size:1.02rem;margin:0;letter-spacing:.05em;color:var(--gold);font-weight:600}
  header h1 small{display:block;font-size:.64rem;color:var(--gold-dim);letter-spacing:.18em;text-transform:uppercase}
  .hud{display:flex;align-items:center;gap:.7rem}
  .timer{font-variant-numeric:tabular-nums;font-size:1.05rem;min-width:4.2rem;text-align:right}
  button{font-family:inherit;cursor:pointer;border:1px solid var(--gold-dim);background:#2c2118;
    color:var(--gold);padding:.4rem .8rem;border-radius:5px;letter-spacing:.04em;transition:.15s;font-size:.85rem}
  button:hover{background:#3a2c1f;border-color:var(--gold)}
  button:disabled{opacity:.4;cursor:default}
  main{flex:1;display:flex;flex-direction:column;align-items:center;padding:1rem}

  /* ---------- Menü ---------- */
  .menu{width:min(880px,96vw)}
  .menu .lead{color:#cbb894;font-style:italic;margin:.3rem 0 1.1rem;line-height:1.5}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem}
  .lvl{border:1px solid var(--line);border-radius:12px;padding:1.1rem;background:linear-gradient(#241b14,#1a130d);
    cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .lvl:hover{border-color:var(--gold);transform:translateY(-3px)}
  .lvl.locked{opacity:.5;cursor:default}
  .lvl.locked:hover{transform:none;border-color:var(--line)}
  .lvl .em{font-size:2.4rem}
  .lvl h3{margin:.5rem 0 .2rem;color:var(--gold);font-size:1.1rem}
  .lvl .sub{font-size:.8rem;color:#cbb894}
  .lvl .meta{margin-top:.7rem;font-size:.72rem;color:var(--gold-dim);letter-spacing:.06em;display:flex;justify-content:space-between}
  .lvl .lockico{position:absolute;top:.8rem;right:.9rem;font-size:1.1rem}
  .badge{display:inline-block;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;
    border:1px solid var(--good);color:var(--good);border-radius:20px;padding:.1rem .5rem;margin-top:.5rem}

  /* ---------- Raum ---------- */
  .room{position:relative;width:min(880px,96vw);aspect-ratio:16/10;border-radius:10px;overflow:hidden;
    box-shadow:inset 0 0 120px rgba(0,0,0,.7),0 10px 40px rgba(0,0,0,.6);border:1px solid #4a3724}
  .room.study{background:linear-gradient(180deg,#3b2c1e 0%,#33261a 55%,#2a1f15 55%,#241a12 100%)}
  .room.ship{background:linear-gradient(180deg,#13212b 0%,#0f1a22 55%,#0b1419 55%,#080f13 100%);border-color:#1f3b4a}
  .room::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(70% 60% at 50% 45%,transparent 40%,rgba(0,0,0,.55) 100%)}
  .room.ship::before{background:radial-gradient(70% 60% at 50% 45%,transparent 35%,rgba(0,10,20,.6) 100%)}

  .hot{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;text-align:center;user-select:none;border:1px dashed transparent;border-radius:8px;
    transition:.15s;padding:.2rem}
  .hot:hover{border-color:var(--gold);background:rgba(201,162,75,.10);transform:translateY(-2px)}
  .hot .ico{font-size:2.3rem;line-height:1;filter:drop-shadow(0 3px 4px #000a)}
  .hot .lbl{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#d9cbb2;margin-top:.25rem;opacity:0;transition:.15s}
  .hot:hover .lbl{opacity:1}
  .hot.done .ico{filter:drop-shadow(0 0 6px var(--good))}

  .inv{width:min(880px,96vw);margin-top:.8rem;display:flex;align-items:center;gap:.6rem;
    padding:.6rem .8rem;border:1px solid var(--line);border-radius:8px;background:var(--panel);min-height:62px;flex-wrap:wrap}
  .inv .tag{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);margin-right:.2rem}
  .slot{width:44px;height:44px;border:1px solid var(--line);border-radius:6px;display:flex;align-items:center;
    justify-content:center;font-size:1.5rem;background:#1d1610;cursor:pointer;transition:.15s}
  .slot.filled:hover{border-color:var(--gold);background:#2c2118}
  .slot.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,162,75,.4)}

  .veil{position:fixed;inset:0;background:rgba(5,4,2,.82);display:none;align-items:center;justify-content:center;padding:1rem;z-index:50}
  .veil.on{display:flex}
  .card{width:min(440px,94vw);background:linear-gradient(#261d15,#1c150e);border:1px solid var(--gold-dim);
    border-radius:12px;padding:1.3rem 1.4rem;box-shadow:0 20px 60px #000a;animation:pop .18s ease}
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .card h2{margin:.1rem 0 .5rem;color:var(--gold);font-size:1.2rem}
  .card p{line-height:1.5;font-size:.95rem;color:#ddd0bb;margin:.4rem 0}
  .card .act{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem;justify-content:flex-end}
  .quote{border-left:2px solid var(--gold-dim);padding-left:.7rem;font-style:italic;color:#cbb894}
  .msg{font-size:.85rem;min-height:1.2em;margin-top:.5rem}
  .msg.bad{color:var(--bad)} .msg.good{color:var(--good)}
  .hint{font-size:.85rem;color:#cbb894;font-style:italic}

  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin:.6rem auto 0;max-width:200px}
  .pad button{font-size:1.1rem;padding:.55rem 0}
  .readout{font-size:1.7rem;letter-spacing:.4rem;text-align:center;background:#0e0a06;border:1px solid var(--line);
    border-radius:6px;padding:.5rem;margin:.4rem 0;color:var(--gold);min-height:2.6rem;font-variant-numeric:tabular-nums}

  .decoder{display:flex;flex-direction:column;align-items:center;gap:.5rem}
  .calib{display:flex;align-items:center;gap:.6rem;font-size:1.05rem}
  .calib .val{min-width:2.4rem;text-align:center;font-size:1.5rem;color:var(--gold);border:1px solid var(--line);border-radius:6px;padding:.1rem .4rem}
  table.dec{border-collapse:collapse;margin-top:.3rem}
  table.dec td{border:1px solid var(--line);padding:.22rem .5rem;text-align:center;font-size:1rem}
  table.dec td.dig{color:var(--gold);font-variant-numeric:tabular-nums}
  table.dec tr.hi td{background:rgba(201,162,75,.16)}
  .cipher{font-size:2rem;letter-spacing:.5rem;text-align:center;margin:.3rem 0;color:#f0e6d2}

  .clockface{width:130px;height:130px;border-radius:50%;border:4px solid var(--gold-dim);margin:.4rem auto;position:relative;background:#15100a}
  .clockface .num{position:absolute;font-size:.7rem;color:#cbb894;transform:translate(-50%,-50%)}
  .hand{position:absolute;left:50%;bottom:50%;transform-origin:bottom center;background:var(--gold);border-radius:2px}

  .win .card{text-align:center;border-color:var(--good)}
  .win h2{color:var(--good);font-size:1.6rem}
  .big{font-size:2.4rem;color:var(--gold);font-variant-numeric:tabular-nums;margin:.3rem 0}
  footer{padding:.5rem;text-align:center;font-size:.64rem;color:#6b5a42;letter-spacing:.1em}
</style>
</head>
<body>
<header>
  <h1 id="title">EXIT-Prototyp<small id="subtitle">Level-Engine</small></h1>
  <div class="hud">
    <span class="timer" id="timer" style="display:none">00:00</span>
    <button id="hintBtn" style="display:none">Hinweis</button>
    <button id="menuBtn" style="display:none">Menü</button>
  </div>
</header>

<main id="main"></main>

<div class="veil" id="veil"><div class="card" id="card"></div></div>
<div class="veil win" id="winVeil"><div class="card" id="winCard"></div></div>
<footer>Daten-getriebene Level-Engine · neue Räume = neue Daten, kein neuer Code</footer>

<script>
/* =====================================================================
   LEVEL-DATEN  –  ein Raum ist nur eine Daten-Definition.
   Objekt-Typen, die die Engine kennt:
     info   – untersuchen (Text, optional Uhr, optional needFlag)
     pickup – Gegenstand aufnehmen (gives)
     locked – mit Gegenstand öffnen (requires -> gives / setFlag / reveal)
     keypad – Zahlencode (code -> gives / setFlag / win)
     reveal – Objekt beiseite schieben, anderes Objekt freilegen
     goal   – Ausgang (requires Gegenstand -> Sieg)
   Inventar-Werkzeuge: kind:'decoder' | 'card'
   ===================================================================== */
const LEVELS = [
{
  id:'study', theme:'study', em:'🕯️',
  title:'Das vergessene Arbeitszimmer', subtitle:'Kapitel 1',
  intro:'Die Tür fällt hinter dir ins Schloss. Staub, alte Bücher, eine stehengebliebene Uhr. Du musst hier raus.',
  symbols:['☀','☾','★','✦','❄','◆','■','●','▲','✚'],
  cipher:['★','●','☀','◆'],
  items:{
    brass_key:{icon:'🗝️',name:'Messingschlüssel',desc:'Klein und abgegriffen – passt zu einem Möbelschloss.'},
    decoder  :{icon:'🧭',name:'Decoder-Scheibe',kind:'decoder',desc:'Außen Symbole, innen Ziffern. Lässt sich kalibrieren.'},
    card     :{icon:'🃏',name:'Symbolkarte',kind:'card',desc:'Vier eingeprägte Symbole.'},
    door_key :{icon:'🔑',name:'Türschlüssel',desc:'Schwer und alt. Der Weg nach draußen.'},
  },
  objects:[
    {id:'door',  icon:'🚪', label:'Tür',         x:'6%',  y:'20%', w:'96px',  h:'140px',
      type:'goal', requires:'door_key',
      examine:'Verschlossen. Ein massives Schloss, kein Knauf. Ohne den passenden Schlüssel bleibt sie zu.'},
    {id:'clock', icon:'🕰️', label:'Wanduhr',     x:'44%', y:'9%',  w:'70px',  h:'70px',
      type:'info', clock:7,
      examine:'Die Uhr ist stehengeblieben. Der große Zeiger fehlt – der kleine zeigt auf die <strong>Sieben</strong>.',
      hint:'„Die Zeit gibt die Zahl zur Scheibe."'},
    {id:'shelf', icon:'📚', label:'Bücherregal', x:'24%', y:'30%', w:'96px',  h:'120px',
      type:'pickup', gives:['brass_key'], take:'Rotes Buch herausziehen',
      examine:'Dutzende verstaubte Bände – bis auf ein <strong>rotes Buch</strong>, dessen Rücken blank gewischt ist.',
      pickupText:'Hinter dem hohlen Buch klemmt ein Messingschlüssel!',
      emptyText:'Nur noch eine staubige Lücke hinter dem hohlen Buch.'},
    {id:'desk',  icon:'🛋️', label:'Schreibtisch',x:'46%', y:'60%', w:'120px', h:'110px',
      type:'info',
      examine:'Auf der Lederplatte ein Notizblock:<br><span class="quote">„Hinter dem <u>Wissen</u> verbirgt sich der Schlüssel.<br>Die <u>Zeit</u> kalibriert die Scheibe.<br>Was die Scheibe übersetzt, öffnet die <u>Wand</u>."</span>'},
    {id:'drawer',icon:'🗄️', label:'Schublade',  x:'64%', y:'66%', w:'74px',  h:'70px',
      type:'locked', requires:'brass_key', gives:['decoder','card'],
      lockedText:'Abgeschlossen. Das Schloss ist klein – ein Möbelschlüssel würde genügen.',
      openText:'Der Messingschlüssel dreht sich mit einem satten Klick. Darin: eine Decoder-Scheibe und eine Symbolkarte.',
      emptyText:'Leer – Decoder und Karte hast du bereits.'},
    {id:'painting',icon:'🖼️',label:'Gemälde',   x:'70%', y:'12%', w:'96px',  h:'80px',
      type:'reveal', reveal:'safe', setFlag:'painting',
      examine:'Das Porträt eines strengen alten Herrn – es hängt einen Hauch zu weit von der Wand ab.',
      revealText:'Gemälde beiseiteschieben'},
    {id:'safe',  icon:'🔒', label:'Wandsafe',    x:'71%', y:'12%', w:'90px',  h:'78px', hidden:true,
      type:'keypad', code:'9472', gives:['door_key'],
      prompt:'Ein vierstelliges Zahlenschloss.',
      successText:'Klack! Der Safe springt auf – ein Türschlüssel liegt darin.'},
  ],
  hints:[
    L=>!has('brass_key') && 'Untersuche den Schreibtisch (Notizblock) und das Bücherregal – „hinter dem Wissen".',
    L=>(has('brass_key')&&!opened('drawer')) && 'Benutze den Messingschlüssel an der Schublade.',
    L=>(opened('drawer')&&!flag('painting')) && 'Sieh dir die Wanduhr (Zahl) und die Symbolkarte an. Das Gemälde verbirgt etwas.',
    L=>(flag('painting')&&!has('door_key')) && 'Öffne die Decoder-Scheibe (Inventar auswählen → Doppelklick), kalibriere auf die Uhr-Zahl und lies die 4 Kartensymbole als Safe-Code.',
    L=>has('door_key') && 'Du hast den Türschlüssel – ab zur Tür!',
  ],
},
{
  id:'ship', theme:'ship', em:'🛰️',
  title:'Die treibende Brücke', subtitle:'Kapitel 2',
  intro:'Notbeleuchtung. Das Schiff treibt antriebslos. Die Luftschleuse ist verriegelt – bring die Systeme online und komm raus.',
  symbols:[], cipher:[],
  items:{
    wrench:{icon:'🔧',name:'Multitool',desc:'Ein magnetisches Multitool. Öffnet Wartungsklappen.'},
    fuse  :{icon:'🔋',name:'Sicherung',desc:'Eine Energiezelle für das Hauptpaneel.'},
  },
  objects:[
    {id:'airlock',icon:'🛸', label:'Luftschleuse', x:'6%', y:'22%', w:'100px', h:'150px',
      type:'keypad', code:'4198', win:true,
      prompt:'Die Schleusensteuerung verlangt einen vierstelligen Freigabecode.',
      successText:'Druckausgleich läuft … die Schleuse öffnet sich zischend.'},
    {id:'log',  icon:'📟', label:'Logbuch',     x:'42%', y:'12%', w:'80px', h:'70px',
      type:'info',
      examine:'Letzter Eintrag des Captains:<br><span class="quote">„Freigabecode = die Sterne der Sternenkarte, von links nach rechts gezählt. Aber zuerst muss die Brücke <u>Strom</u> haben."</span>'},
    {id:'toolkit',icon:'🧰', label:'Werkzeugkiste',x:'24%', y:'62%', w:'90px', h:'80px',
      type:'pickup', gives:['wrench'], take:'Kiste durchsuchen',
      examine:'Eine umgekippte Werkzeugkiste, der Inhalt verstreut.',
      pickupText:'Du findest ein magnetisches Multitool.',
      emptyText:'Nur noch loses Werkzeug – das Multitool hast du.'},
    {id:'grate',icon:'🛗', label:'Wartungsklappe',x:'48%', y:'60%', w:'80px', h:'90px',
      type:'locked', requires:'wrench', gives:['fuse'],
      lockedText:'Eine verschraubte Wartungsklappe. Ohne Werkzeug bekommst du sie nicht auf.',
      openText:'Das Multitool löst die Schrauben. Dahinter: eine Energiezelle.',
      emptyText:'Leer – die Sicherung ist entnommen.'},
    {id:'power',icon:'🎛️', label:'Hauptpaneel', x:'68%', y:'60%', w:'90px', h:'90px',
      type:'locked', requires:'fuse', setFlag:'power',
      lockedText:'Das Hauptpaneel ist tot. Ein Steckplatz für eine Energiezelle ist leer.',
      openText:'Du setzt die Sicherung ein – die Brücke erwacht, die Sternenkarte flackert an!',
      emptyText:'Läuft auf Hochtouren. Die Sternenkarte leuchtet.'},
    {id:'starmap',icon:'🗺️', label:'Sternenkarte',x:'70%', y:'14%', w:'90px', h:'78px',
      type:'info', needFlag:'power',
      offText:'Ein dunkler Bildschirm. Ohne Strom bleibt er schwarz.',
      examine:'Vier Sternencluster leuchten auf. Du zählst von links nach rechts: <strong>4 – 1 – 9 – 8</strong> Sterne.',
      hint:'Diese vier Zahlen sind der Freigabecode der Schleuse.'},
  ],
  hints:[
    L=>!has('wrench') && 'Durchsuche die Werkzeugkiste am Boden.',
    L=>(has('wrench')&&!has('fuse')) && 'Öffne die Wartungsklappe mit dem Multitool.',
    L=>(has('fuse')&&!flag('power')) && 'Setze die Sicherung ins Hauptpaneel ein, um Strom zu geben.',
    L=>(flag('power')) && 'Lies die Sternenkarte ab (jetzt mit Strom) und gib die Zahlen in die Luftschleuse ein.',
  ],
},
];

/* =====================================================================
   ENGINE
   ===================================================================== */
let L = null;                 // aktueller Level-Laufzeitzustand
const $ = id => document.getElementById(id);

/* ----- Fortschritt (localStorage) ----- */
function loadProg(){ try{return JSON.parse(localStorage.getItem('exitProg'))||{}}catch(e){return {}} }
function saveProg(p){ try{localStorage.setItem('exitProg',JSON.stringify(p))}catch(e){} }

/* ----- Hilfen, die Hint-Funktionen nutzen ----- */
function has(id){ return L.inv.includes(id); }
function flag(f){ return L.flags.has(f); }
function opened(id){ return L.opened.has(id); }

/* ----- MENÜ ----- */
function showMenu(){
  L=null;
  $('timer').style.display='none'; $('hintBtn').style.display='none'; $('menuBtn').style.display='none';
  $('title').firstChild.textContent='EXIT-Prototyp'; $('subtitle').textContent='Level-Auswahl';
  const prog=loadProg();
  const cards=LEVELS.map((lv,i)=>{
    const unlocked = i===0 || (prog[LEVELS[i-1].id]&&prog[LEVELS[i-1].id].done);
    const rec=prog[lv.id];
    return `<div class="lvl ${unlocked?'':'locked'}" ${unlocked?`onclick="startLevel(${i})"`:''}>
      ${unlocked?'':'<div class="lockico">🔒</div>'}
      <div class="em">${lv.em}</div>
      <h3>${lv.title}</h3>
      <div class="sub">${lv.subtitle}</div>
      ${rec&&rec.done?`<div class="badge">✓ Gelöst · ${fmt(rec.best)}</div>`:''}
      <div class="meta"><span>${lv.objects.length} Objekte</span><span>${unlocked?'Spielen ▶':'Gesperrt'}</span></div>
    </div>`;
  }).join('');
  $('main').innerHTML=`<div class="menu">
    <p class="lead">Wähle ein Kapitel. Jeder Raum ist eine eigene, datengetriebene Level-Definition –
    so wächst das Spiel einfach um neue Räume.</p>
    <div class="grid">${cards}</div></div>`;
}

/* ----- LEVEL START ----- */
function startLevel(idx){
  const def=LEVELS[idx];
  L={ idx, def, inv:[], flags:new Set(), taken:new Set(), opened:new Set(),
      revealed:new Set(), sel:null, offset:0, t0:Date.now(), done:false };
  $('title').firstChild.textContent=def.title; $('subtitle').textContent=def.subtitle;
  $('timer').style.display=''; $('hintBtn').style.display=''; $('menuBtn').style.display='';
  $('main').innerHTML=`<div class="room ${def.theme}" id="room"></div><div class="inv" id="inv"></div>`;
  const room=$('room');
  def.objects.forEach(o=>{
    const el=document.createElement('div'); el.className='hot'; el.dataset.id=o.id;
    el.style.cssText=`left:${o.x};top:${o.y};width:${o.w};height:${o.h};${o.hidden?'display:none':''}`;
    el.innerHTML=`<div class="ico">${o.icon}</div><div class="lbl">${o.label}</div>`;
    el.onclick=()=>interact(o);
    room.appendChild(el);
  });
  renderInv();
  open(`<h2>${def.em} ${def.title}</h2><p>${def.intro}</p>
    <div class="act"><button onclick="close()">Los geht's</button></div>`);
}

/* ----- INVENTAR ----- */
function renderInv(){
  const inv=$('inv'); if(!inv)return;
  inv.innerHTML='<span class="tag">Inventar</span>';
  for(let i=0;i<6;i++){
    const it=L.inv[i]; const slot=document.createElement('div');
    slot.className='slot'+(it?' filled':'')+(L.sel===it&&it?' sel':'');
    if(it){ slot.textContent=L.def.items[it].icon; slot.title=L.def.items[it].name;
      slot.onclick=()=>{ L.sel=(L.sel===it?null:it); renderInv();
        if(L.sel) flash(L.def.items[it].name+' ausgewählt – auf ein Objekt anwenden, oder Doppelklick zum Untersuchen.'); };
      slot.ondblclick=()=>inspect(it);
    }
    inv.appendChild(slot);
  }
}
function give(ids){ (ids||[]).forEach(id=>{ if(!L.inv.includes(id)) L.inv.push(id); }); renderInv(); }
function setDone(id){ document.querySelector(`.hot[data-id="${id}"]`)?.classList.add('done'); }

let flashTimer;
function flash(t){ clearTimeout(flashTimer); let b=$('flashBar');
  if(!b){b=document.createElement('div');b.id='flashBar';
    b.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#2c2118;border:1px solid var(--gold-dim);color:var(--gold);padding:.5rem 1rem;border-radius:8px;z-index:80;font-size:.85rem;box-shadow:0 8px 24px #000a;transition:.3s';
    document.body.appendChild(b);}
  b.textContent=t; b.style.opacity='1'; flashTimer=setTimeout(()=>b.style.opacity='0',2200);
}

/* ----- MODAL ----- */
function open(html){ $('card').innerHTML=html; $('veil').classList.add('on'); }
function close(){ $('veil').classList.remove('on'); }
$('veil').onclick=e=>{ if(e.target===$('veil')) close(); };
const btnClose='<button onclick="close()">Schließen</button>';

/* ----- INTERAKTION (Kern der Engine) ----- */
function interact(o){
  switch(o.type){
    case 'info':{
      const dark = o.needFlag && !flag(o.needFlag);
      open(`<h2>${o.icon} ${o.label}</h2><p>${dark?o.offText:o.examine}</p>
        ${(!dark&&o.hint)?`<p class="hint">${o.hint}</p>`:''}
        ${o.clock?'<div class="clockface" id="cf"></div>':''}
        <div class="act">${btnClose}</div>`);
      if(o.clock) drawClock(o.clock);
      break;
    }
    case 'pickup':{
      if(L.taken.has(o.id)){ open(`<h2>${o.icon} ${o.label}</h2><p>${o.emptyText}</p><div class="act">${btnClose}</div>`); break; }
      open(`<h2>${o.icon} ${o.label}</h2><p>${o.examine}</p>
        <div class="act"><button onclick="doPickup('${o.id}')">${o.take||'Nehmen'}</button>${btnClose}</div>
        <div class="msg" id="m"></div>`);
      break;
    }
    case 'locked':{
      if(L.opened.has(o.id)){ open(`<h2>${o.icon} ${o.label}</h2><p>${o.emptyText}</p><div class="act">${btnClose}</div>`); break; }
      if(has(o.requires)){
        L.opened.add(o.id); if(o.setFlag)L.flags.add(o.setFlag); give(o.gives); setDone(o.id); L.sel=null; renderInv();
        if(o.reveal) doReveal(o.reveal);
        open(`<h2>${o.icon} ${o.label}</h2><p>${o.openText}</p><div class="act">${btnClose}</div>`);
        if(o.gives&&o.gives.length) flash(o.gives.map(g=>L.def.items[g].icon+' '+L.def.items[g].name).join(' · ')+' erhalten');
      } else {
        open(`<h2>${o.icon} ${o.label}</h2><p>${o.lockedText}</p><div class="act">${btnClose}</div>`);
      }
      break;
    }
    case 'reveal':{
      if(L.revealed.has(o.id)){ const t=L.def.objects.find(x=>x.id===o.reveal); interact(t); break; }
      open(`<h2>${o.icon} ${o.label}</h2><p>${o.examine}</p>
        <div class="act"><button onclick="doReveal('${o.reveal}','${o.id}')">${o.revealText}</button>${btnClose}</div>`);
      break;
    }
    case 'keypad':{
      if(L.opened.has(o.id)){ open(`<h2>${o.icon} ${o.label}</h2><p>${o.successText}</p><div class="act">${btnClose}</div>`); break; }
      openKeypad(o); break;
    }
    case 'goal':{
      if(has(o.requires)){ winLevel(); }
      else open(`<h2>${o.icon} ${o.label}</h2><p>${o.examine}</p><div class="act">${btnClose}</div>`);
      break;
    }
  }
}
function doPickup(id){
  const o=L.def.objects.find(x=>x.id===id);
  L.taken.add(id); if(o.setFlag)L.flags.add(o.setFlag); give(o.gives); setDone(id);
  const m=$('m'); if(m){m.className='msg good';m.textContent=o.pickupText;}
  flash(o.gives.map(g=>L.def.items[g].icon+' '+L.def.items[g].name).join(' · ')+' erhalten');
}
function doReveal(targetId, selfId){
  if(selfId){ const self=L.def.objects.find(x=>x.id===selfId);
    L.revealed.add(selfId); if(self.setFlag)L.flags.add(self.setFlag);
    document.querySelector(`.hot[data-id="${selfId}"]`).style.display='none'; }
  document.querySelector(`.hot[data-id="${targetId}"]`).style.display='flex';
  const t=L.def.objects.find(x=>x.id===targetId);
  if(selfId){ flash('Dahinter kommt etwas zum Vorschein …'); interact(t); }
}

/* ----- KEYPAD ----- */
let entered='';
function openKeypad(o){
  entered=''; currentKeypad=o;
  open(`<h2>${o.icon} ${o.label}</h2><p>${o.prompt}</p>
    <div class="readout" id="ro"></div>
    <div class="pad" id="pad"></div>
    <div class="msg" id="sm"></div>
    <div class="act"><button onclick="clr()">Löschen</button>${btnClose}</div>`);
  showPad(o.code.length);
  const pad=$('pad');
  '1234567890'.split('').forEach(n=>{ const b=document.createElement('button'); b.textContent=n;
    b.onclick=()=>tap(n,o); pad.appendChild(b); });
}
function showPad(len){ $('ro').textContent=entered.padEnd(len,'—').split('').join(' '); }
function clr(){ entered=''; const o=currentKeypad; showPad(o.code.length); $('sm').textContent=''; }
let currentKeypad=null;
function tap(n,o){ currentKeypad=o; if(entered.length>=o.code.length)return; entered+=n; showPad(o.code.length);
  if(entered.length===o.code.length) checkPad(o); }
function checkPad(o){
  const sm=$('sm');
  if(entered===o.code){
    L.opened.add(o.id); if(o.setFlag)L.flags.add(o.setFlag); give(o.gives); setDone(o.id);
    sm.className='msg good'; sm.textContent=o.successText;
    if(o.gives&&o.gives.length) flash(o.gives.map(g=>L.def.items[g].icon+' '+L.def.items[g].name).join(' · ')+' erhalten');
    if(o.win){ setTimeout(winLevel,1100); } else { setTimeout(close,1200); }
  } else {
    sm.className='msg bad'; sm.textContent='Nichts rührt sich. Falscher Code.';
    setTimeout(()=>{ entered=''; showPad(o.code.length); },700);
  }
}

/* ----- Inventar-Werkzeuge untersuchen ----- */
function inspect(id){
  const it=L.def.items[id];
  if(it.kind==='decoder') return openDecoder();
  if(it.kind==='card')    return openCard();
  open(`<h2>${it.icon} ${it.name}</h2><p>${it.desc}</p><div class="act">${btnClose}</div>`);
}
function openCard(){
  open(`<h2>🃏 Symbolkarte</h2><p>Vier eingeprägte Symbole, in dieser Reihenfolge:</p>
    <div class="cipher">${L.def.cipher.join(' ')}</div>
    <p class="hint">Mit der Decoder-Scheibe übersetzen.</p><div class="act">${btnClose}</div>`);
}
function openDecoder(){
  open(`<h2>🧭 Decoder-Scheibe</h2><p>Kalibrieren und je Symbol die Ziffer ablesen.</p>
    <div class="decoder">
      <div class="calib"><button onclick="rot(-1)">◀</button><span>Kalibrierung</span>
        <span class="val" id="dv">0</span><button onclick="rot(1)">▶</button></div>
      <table class="dec" id="dtab"></table></div>
    <p class="hint">„Die Zeit kalibriert die Scheibe."</p><div class="act">${btnClose}</div>`);
  drawDecoder();
}
function rot(d){ L.offset=(L.offset+d+10)%10; drawDecoder(); }
function drawDecoder(){
  $('dv').textContent=L.offset; const onCard=new Set(L.def.cipher); const S=L.def.symbols;
  $('dtab').innerHTML=S.map(sym=>{ const dig=(S.indexOf(sym)+L.offset)%10;
    return `<tr class="${onCard.has(sym)?'hi':''}"><td>${sym}</td><td>→</td><td class="dig">${dig}</td></tr>`;
  }).join('');
}

/* ----- Uhr ----- */
function drawClock(hour){
  const cf=$('cf'); if(!cf)return; const R=58;
  for(let i=1;i<=12;i++){ const a=(i/12)*2*Math.PI-Math.PI/2; const s=document.createElement('div');
    s.className='num'; s.textContent=i; s.style.left=(65+Math.cos(a)*R)+'px'; s.style.top=(65+Math.sin(a)*R)+'px'; cf.appendChild(s); }
  const h=document.createElement('div'); h.className='hand'; h.style.width='5px'; h.style.height='34px';
  h.style.transform=`rotate(${hour/12*360}deg)`; cf.appendChild(h);
  const dot=document.createElement('div');
  dot.style.cssText='position:absolute;left:50%;top:50%;width:9px;height:9px;background:var(--gold);border-radius:50%;transform:translate(-50%,-50%)';
  cf.appendChild(dot);
}

/* ----- Hinweise ----- */
$('hintBtn').onclick=()=>{
  for(const h of (L.def.hints||[])){ const t=h(L); if(t){ open(`<h2>💡 Hinweis</h2><p>${t}</p><div class="act">${btnClose}</div>`); return; } }
  open(`<h2>💡 Hinweis</h2><p>Du bist auf dem richtigen Weg – probier den Ausgang!</p><div class="act">${btnClose}</div>`);
};
$('menuBtn').onclick=()=>{ if(confirm('Zurück zum Menü? Der aktuelle Fortschritt im Raum geht verloren.')) showMenu(); };

/* ----- Timer & Sieg ----- */
function fmt(s){ return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
setInterval(()=>{ if(!L||L.done)return; const s=Math.floor((Date.now()-L.t0)/1000); $('timer').textContent=fmt(s); },250);
function winLevel(){
  close(); L.done=true; setDone(L.def.objects.find(o=>o.type==='goal'||o.win)?.id);
  const s=Math.floor((Date.now()-L.t0)/1000);
  const prog=loadProg(); const rec=prog[L.def.id]||{};
  const best=(rec.best&&rec.best<s)?rec.best:s; prog[L.def.id]={done:true,best}; saveProg(prog);
  const next=LEVELS[L.idx+1];
  $('winCard').innerHTML=`<h2>🎉 Geschafft!</h2>
    <p>${L.def.title} gelöst.</p><div class="big">${fmt(s)}</div>
    <p class="hint">Bestzeit: ${fmt(best)}</p>
    <div class="act" style="justify-content:center">
      ${next?`<button onclick="$('winVeil').classList.remove('on');startLevel(${L.idx+1})">Nächstes Kapitel ▶</button>`:''}
      <button onclick="$('winVeil').classList.remove('on');showMenu()">Zum Menü</button></div>`;
  $('winVeil').classList.add('on');
}

showMenu();
</script>
</body>
